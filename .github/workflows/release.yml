name: Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows
        run: pnpm make --platform win32 --targets @electron-forge/maker-squirrel

      - name: Upload Windows artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: out/make/squirrel.windows/x64/MatrixSetup.exe
          asset_name: MatrixSetup.exe
          asset_content_type: application/x-msdownload

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS
        run: pnpm make --platform darwin --targets @electron-forge/maker-zip

      - name: Find macOS artifact
        id: find-mac
        run: echo "artifact=$(find out/make -name '*.zip' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload macOS artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-mac.outputs.artifact }}
          asset_name: Matrix-macOS.zip
          asset_content_type: application/zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux
        run: pnpm make --platform linux --targets @electron-forge/maker-deb

      - name: Find Linux DEB artifact
        id: find-deb
        run: echo "artifact=$(find out/make -name '*.deb' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload Linux DEB artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-deb.outputs.artifact }}
          asset_name: matrix_amd64.deb
          asset_content_type: application/x-debian-package
