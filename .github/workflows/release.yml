name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run typecheck

  build-windows:
    needs: ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build Windows
        run: pnpm make --platform win32 --targets @electron-forge/maker-squirrel

      - name: Find Windows artifacts
        id: find-win
        shell: bash
        run: |
          exe=$(find out/make -name '*.exe' | head -1)
          nupkg=$(find out/make -name '*.nupkg' | head -1)
          releases=$(find out/make -name 'RELEASES' | head -1)
          echo "exe=$exe" >> $GITHUB_OUTPUT
          echo "nupkg=$nupkg" >> $GITHUB_OUTPUT
          echo "nupkg_name=$(basename "$nupkg")" >> $GITHUB_OUTPUT
          echo "releases=$releases" >> $GITHUB_OUTPUT

      - name: Upload Windows Setup
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.find-win.outputs.exe }}
            ${{ steps.find-win.outputs.nupkg }}
            ${{ steps.find-win.outputs.releases }}

  build-mac:
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm make --platform darwin --targets @electron-forge/maker-zip

      - name: Find macOS artifact
        id: find-mac
        run: echo "artifact=$(find out/make -name '*.zip' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload macOS artifact
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.find-mac.outputs.artifact }}

  build-linux:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build Linux
        run: pnpm make --platform linux --targets @electron-forge/maker-deb

      - name: Find Linux artifact
        id: find-deb
        run: echo "artifact=$(find out/make -name '*.deb' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload Linux artifact
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.find-deb.outputs.artifact }}
